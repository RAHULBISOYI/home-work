<!DOCTYPE html>
<html lang="or">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odia Daily Translation Form Website</title>

  <!-- Firebase -->
  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getFirestore,
      collection,
      addDoc,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // PASTE YOUR FIREBASE CONFIG HERE
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.db = db;
    window.collection = collection;
    window.addDoc = addDoc;
    window.getDocs = getDocs;

  </script>

  <style>

    :root {
      --primary-color: #4a6fa5;
      --secondary-color: #166088;
      --success-color: #2e7d32;
      --danger-color: #c62828;
      --background-color: #f4f6f9;
      --card-color: #ffffff;
      --text-color: #333333;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--background-color);
      color: var(--text-color);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: var(--secondary-color);
      margin-bottom: 20px;
    }

    .nav-tabs {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-bottom: 25px;
    }

    .nav-btn {
      background-color: #e2e8f0;
      color: #333;
      font-weight: 600;
      padding: 12px 25px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .nav-btn.active {
      background-color: var(--primary-color);
      color: white;
    }

    .section-card {
      background: var(--card-color);
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-bottom: 25px;
    }

    h2 {
      margin-top: 0;
      color: var(--primary-color);
    }

    .password-box {
      background: #fff8e1;
      border: 1px solid #ffe082;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
    }

    .input-group {
      background: #fdfdfd;
      border: 1px solid #e2e8f0;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-top: 10px;
      margin-bottom: 5px;
    }

    input[type="text"],
    input[type="password"],
    textarea {

      width: 100%;
      padding: 10px;
      border: 1px solid #cccccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 16px;
    }

    textarea {
      resize: vertical;
      min-height: 60px;
    }

    button {
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
    }

    .btn-success {
      background-color: var(--success-color);
    }

    .btn-danger {
      background-color: var(--danger-color);
    }

    .button-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .question-box {
      background: #f9fbfd;
      border-left: 4px solid var(--primary-color);
      padding: 15px;
      margin-bottom: 15px;
    }

    .result-card {
      background: #fff;
      border: 1px solid #ddd;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 6px;
    }

    .hidden {
      display: none !important;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>Odia Daily Translation Portal</h1>

  <div class="nav-tabs">
    <button id="navUpload"
    class="nav-btn active"
    onclick="switchTab('upload')">

      Go to Upload Section

    </button>

    <button id="navFill"
    class="nav-btn"
    onclick="switchTab('fill')">

      Go to Homework Section

    </button>
  </div>

  <!-- Lock Screen -->

  <div id="lockScreenPanel"
  class="section-card hidden">

    <h2>Upload Section Locked</h2>

    <input type="password"
    id="unlockPasswordInput"
    placeholder="Enter Password">

    <br><br>

    <button class="btn-success"
    onclick="verifyAndUnlock()">

      Unlock Section

    </button>

  </div>

  <!-- Upload Section -->

  <div id="uploadSectionPanel"
  class="section-card">

    <h2>Upload Translation Questions</h2>

    <div class="password-box">

      <label>
        Set Protection Password
      </label>

      <input type="password"
      id="sectionLockPassword"
      placeholder="Set Password">

    </div>

    <div id="dynamic-upload-fields"></div>

    <div class="button-actions">

      <button onclick="addMoreFields()">
        + Add More Row
      </button>

      <button class="btn-success"
      onclick="saveUploadedData()">

        Save & Upload Questions

      </button>

      <button id="lockManuallyBtn"
      class="btn-danger hidden"
      onclick="lockSectionImmediately()">

        Lock Section Now

      </button>

    </div>

  </div>

  <!-- Homework Section -->

  <div id="homeworkSectionPanel"
  class="section-card hidden">

    <h2>Uploaded Questions Will Be Fill Here</h2>

    <form id="homeworkForm"
    onsubmit="showAnswers(event)">

      <div id="answerFormContainer">

        <p>No questions uploaded yet.</p>

      </div>

      <div class="button-actions">

        <button type="submit"
        id="submitHomeworkBtn"
        class="btn-success"
        style="display:none;">

          Do The Homework

        </button>

      </div>

    </form>

  </div>

  <!-- Result Section -->

  <div id="resultsSectionPanel"
  class="section-card hidden">

    <h2>Show All Answers</h2>

    <div id="allAnswersOutput"></div>

  </div>

</div>

<script>

  let fieldCounter = 1;
  let isLocked = false;

  window.onload = function () {

    for(let i = 0; i < 3; i++) {
      addMoreFields();
    }

    const savedPassword =
    localStorage.getItem('uploadSecurityPassword');

    if(savedPassword && savedPassword.trim() !== '') {

      isLocked = true;

      document.getElementById(
      'sectionLockPassword').value = savedPassword;

      document.getElementById(
      'lockManuallyBtn').classList.remove('hidden');
    }

    loadQuestions();

    if(isLocked){
      showLockScreen();
    }
  };

  function switchTab(tabName){

    document.getElementById(
    'navUpload').classList.remove('active');

    document.getElementById(
    'navFill').classList.remove('active');

    if(tabName === 'upload'){

      document.getElementById(
      'navUpload').classList.add('active');

      document.getElementById(
      'homeworkSectionPanel').classList.add('hidden');

      document.getElementById(
      'resultsSectionPanel').classList.add('hidden');

      if(isLocked){
        showLockScreen();
      } else {
        document.getElementById(
        'uploadSectionPanel').classList.remove('hidden');
      }

    } else {

      document.getElementById(
      'navFill').classList.add('active');

      document.getElementById(
      'uploadSectionPanel').classList.add('hidden');

      document.getElementById(
      'lockScreenPanel').classList.add('hidden');

      document.getElementById(
      'homeworkSectionPanel').classList.remove('hidden');

      loadQuestions();
    }
  }

  function addMoreFields(){

    const container =
    document.getElementById('dynamic-upload-fields');

    const group = document.createElement('div');

    group.className = 'input-group';

    group.innerHTML = `

      <h4>Question Set #${fieldCounter}</h4>

      <label>Question:</label>

      <input type="text"
      class="question-input"
      placeholder="Enter Question">

      <label>Correct Answer:</label>

      <input type="text"
      class="answer-input"
      placeholder="Enter Correct Answer">

    `;

    container.appendChild(group);

    fieldCounter++;
  }

  async function saveUploadedData(){

    const questionInputs =
    document.querySelectorAll('.question-input');

    const answerInputs =
    document.querySelectorAll('.answer-input');

    const passwordInputValue =
    document.getElementById(
    'sectionLockPassword').value;

    let uploaded = false;

    for(let i = 0; i < questionInputs.length; i++){

      const question = questionInputs[i].value;
      const answer = answerInputs[i].value;

      if(question.trim() !== '' &&
      answer.trim() !== ''){

        await addDoc(
          collection(db, 'odiaQuestions'),
          {
            question: question,
            answer: answer
          }
        );

        uploaded = true;
      }
    }

    if(!uploaded){

      alert('Please fill at least one question');

      return;
    }

    localStorage.setItem(
    'uploadSecurityPassword',
    passwordInputValue);

    alert('Questions uploaded successfully!');

    switchTab('fill');
  }

  function showLockScreen(){

    document.getElementById(
    'uploadSectionPanel').classList.add('hidden');

    document.getElementById(
    'lockScreenPanel').classList.remove('hidden');
  }

  function verifyAndUnlock(){

    const userInput =
    document.getElementById(
    'unlockPasswordInput').value;

    const correctPassword =
    localStorage.getItem(
    'uploadSecurityPassword');

    if(userInput === correctPassword){

      document.getElementById(
      'lockScreenPanel').classList.add('hidden');

      document.getElementById(
      'uploadSectionPanel').classList.remove('hidden');

    } else {

      alert('Incorrect Password');

    }
  }

  function lockSectionImmediately(){

    isLocked = true;

    showLockScreen();
  }

  async function loadQuestions(){

    const answerForm =
    document.getElementById(
    'answerFormContainer');

    const submitBtn =
    document.getElementById(
    'submitHomeworkBtn');

    answerForm.innerHTML = '';

    const querySnapshot =
    await getDocs(
      collection(db, 'odiaQuestions')
    );

    let sentences = [];

    querySnapshot.forEach((docItem)=>{
      sentences.push(docItem.data());
    });

    window.allQuestions = sentences;

    if(sentences.length === 0){

      answerForm.innerHTML =
      '<p>No questions uploaded yet.</p>';

      submitBtn.style.display = 'none';

      return;
    }

    sentences.forEach((item,index)=>{

      answerForm.innerHTML += `

        <div class="question-box">

          <h3>Question ${index + 1}</h3>

          <p>
            <strong>Translate:</strong>
            ${item.question}
          </p>

          <textarea
          class="user-answer"
          placeholder="Fill your answer here...">
          </textarea>

        </div>

      `;
    });

    submitBtn.style.display = 'inline-block';
  }

  function showAnswers(event){

    event.preventDefault();

    const allAnswers =
    document.getElementById(
    'allAnswersOutput');

    const resultsSection =
    document.getElementById(
    'resultsSectionPanel');

    const userAnswers =
    document.querySelectorAll('.user-answer');

    const sentences =
    window.allQuestions || [];

    allAnswers.innerHTML = '';

    userAnswers.forEach((answer,index)=>{

      const correctData = sentences[index];

      allAnswers.innerHTML += `

        <div class="result-card">

          <p>
            <strong>Question ${index+1}:</strong>
            ${correctData.question}
          </p>

          <p>
            <strong>Your Answer:</strong>
            ${answer.value || 'Left blank'}
          </p>

          <p style="color:green;">
            <strong>Correct Answer:</strong>
            ${correctData.answer}
          </p>

        </div>

      `;
    });

    resultsSection.classList.remove('hidden');

    resultsSection.scrollIntoView({
      behavior:'smooth'
    });
  }

</script>

</body>
</html>
