<!DOCTYPE html>
<html lang="or">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Odia Daily Translation Portal</title>

  <script type="module">
    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getFirestore,
      collection,
      addDoc,
      getDocs
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyADLSNGiwCJsxrD8tPgAWcc_4Jjs9oxkJY",
      authDomain: "odia-translation-portal.firebaseapp.com",
      projectId: "odia-translation-portal",
      storageBucket: "odia-translation-portal.firebasestorage.app",
      messagingSenderId: "893758060843",
      appId: "1:893758060843:web:8a85ce25bf47994070ed6e"
    };

    // INITIALIZE FIREBASE
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    console.log("Firebase Connected Successfully");

    // GLOBAL ACCESS
    window.db = db;
    window.firebaseCollection = collection;
    window.firebaseAddDoc = addDoc;
    window.firebaseGetDocs = getDocs;
  </script>

  <style>
    :root {
      --primary-color: #4a6fa5;
      --secondary-color: #166088;
      --success-color: #2e7d32;
      --danger-color: #c62828;
      --background-color: #f4f6f9;
      --card-color: #ffffff;
      --text-color: #333333;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--background-color);
      margin: 0;
      padding: 20px;
      color: var(--text-color);
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    h1 {
      text-align: center;
      color: var(--secondary-color);
      margin-bottom: 25px;
    }

    .nav-tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .nav-btn {
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      background: #ddd;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .nav-btn.active {
      background: var(--primary-color);
      color: white;
    }

    .section-card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .input-group {
      border: 1px solid #ddd;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 6px;
      background: #fafafa;
    }

    label {
      display: block;
      margin-top: 10px;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input,
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 15px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      color: white;
      background: var(--primary-color);
      font-size: 15px;
    }

    .btn-success {
      background: var(--success-color);
    }

    .btn-danger {
      background: var(--danger-color);
    }

    .button-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    .question-box {
      background: #f9fbfd;
      border-left: 4px solid var(--primary-color);
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 5px;
    }

    .result-card {
      border: 1px solid #ddd;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 5px;
      background: #fff;
    }

    .hidden {
      display: none;
    }

    .loading {
      text-align: center;
      color: var(--secondary-color);
      font-weight: bold;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Odia Daily Translation Portal</h1>

  <!-- NAVIGATION -->
  <div class="nav-tabs">
    <button id="navUpload"
            class="nav-btn active"
            onclick="switchTab('upload')">
      Upload Questions
    </button>

    <button id="navFill"
            class="nav-btn"
            onclick="switchTab('fill')">
      Homework Section
    </button>
  </div>

  <!-- UPLOAD SECTION -->
  <div id="uploadSectionPanel" class="section-card">

    <h2>Upload Translation Questions</h2>

    <div id="dynamic-upload-fields"></div>

    <div class="button-actions">
      <button onclick="addMoreFields()">
        + Add More Row
      </button>

      <button class="btn-success"
              onclick="saveUploadedData()">
        Save & Upload Questions
      </button>
    </div>

    <div id="uploadStatus" class="loading"></div>
  </div>

  <!-- HOMEWORK SECTION -->
  <div id="homeworkSectionPanel"
       class="section-card hidden">

    <h2>Homework Questions</h2>

    <form onsubmit="showAnswers(event)">
      <div id="answerFormContainer"></div>

      <button type="submit"
              id="submitHomeworkBtn"
              class="btn-success hidden">
        Submit Homework
      </button>
    </form>
  </div>

  <!-- RESULTS SECTION -->
  <div id="resultsSectionPanel"
       class="section-card hidden">

    <h2>All Answers</h2>

    <div id="allAnswersOutput"></div>
  </div>

</div>

<script>

  let fieldCounter = 1;
  window.allQuestions = [];

  // PAGE LOAD
  window.onload = function () {

    for (let i = 0; i < 3; i++) {
      addMoreFields();
    }

    setTimeout(() => {
      loadQuestions();
    }, 1000);
  };

  // SWITCH TAB
  function switchTab(tabName) {

    document.getElementById('navUpload')
      .classList.remove('active');

    document.getElementById('navFill')
      .classList.remove('active');

    if (tabName === 'upload') {

      document.getElementById('navUpload')
        .classList.add('active');

      document.getElementById('uploadSectionPanel')
        .classList.remove('hidden');

      document.getElementById('homeworkSectionPanel')
        .classList.add('hidden');

      document.getElementById('resultsSectionPanel')
        .classList.add('hidden');

    } else {

      document.getElementById('navFill')
        .classList.add('active');

      document.getElementById('uploadSectionPanel')
        .classList.add('hidden');

      document.getElementById('homeworkSectionPanel')
        .classList.remove('hidden');

      loadQuestions();
    }
  }

  // ADD QUESTION FIELD
  function addMoreFields() {

    const container =
      document.getElementById('dynamic-upload-fields');

    const group = document.createElement('div');

    group.className = 'input-group';

    group.innerHTML = `
      <h3>Question #${fieldCounter}</h3>

      <label>Question</label>

      <input type="text"
             class="question-input"
             placeholder="Enter Odia Question">

      <label>Correct Answer</label>

      <input type="text"
             class="answer-input"
             placeholder="Enter Correct Answer">
    `;

    container.appendChild(group);

    fieldCounter++;
  }

  // SAVE TO FIREBASE
  async function saveUploadedData() {

    const status =
      document.getElementById('uploadStatus');

    try {

      status.innerHTML = "Uploading Questions...";

      const questionInputs =
        document.querySelectorAll('.question-input');

      const answerInputs =
        document.querySelectorAll('.answer-input');

      let uploaded = false;

      for (let i = 0; i < questionInputs.length; i++) {

        const question =
          questionInputs[i].value.trim();

        const answer =
          answerInputs[i].value.trim();

        if (question !== '' && answer !== '') {

          await window.firebaseAddDoc(
            window.firebaseCollection(
              window.db,
              'odiaQuestions'
            ),
            {
              question: question,
              answer: answer,
              createdAt: new Date()
            }
          );

          uploaded = true;
        }
      }

      if (!uploaded) {

        status.innerHTML = "";

        alert(
          'Please fill at least one question and answer'
        );

        return;
      }

      alert('Questions Uploaded Successfully');

      status.innerHTML = "";

      // RESET FIELDS
      document.getElementById(
        'dynamic-upload-fields'
      ).innerHTML = '';

      fieldCounter = 1;

      for (let i = 0; i < 3; i++) {
        addMoreFields();
      }

      loadQuestions();

      switchTab('fill');

    } catch (error) {

      console.error(error);

      status.innerHTML = "";

      alert(
        "Upload Failed: " + error.message
      );
    }
  }

  // LOAD QUESTIONS
  async function loadQuestions() {

    const answerForm =
      document.getElementById(
        'answerFormContainer'
      );

    const submitBtn =
      document.getElementById(
        'submitHomeworkBtn'
      );

    answerForm.innerHTML =
      '<p class="loading">Loading Questions...</p>';

    try {

      const querySnapshot =
        await window.firebaseGetDocs(
          window.firebaseCollection(
            window.db,
            'odiaQuestions'
          )
        );

      let sentences = [];

      querySnapshot.forEach((docItem) => {
        sentences.push(docItem.data());
      });

      window.allQuestions = sentences;

      answerForm.innerHTML = '';

      if (sentences.length === 0) {

        answerForm.innerHTML =
          '<p>No questions uploaded yet.</p>';

        submitBtn.classList.add('hidden');

        return;
      }

      sentences.forEach((item, index) => {

        answerForm.innerHTML += `
          <div class="question-box">

            <h3>Question ${index + 1}</h3>

            <p>
              <strong>Translate:</strong>
              ${item.question}
            </p>

            <textarea
              class="user-answer"
              placeholder="Write your answer here..."
            ></textarea>

          </div>
        `;
      });

      submitBtn.classList.remove('hidden');

    } catch (error) {

      console.error(error);

      answerForm.innerHTML =
        '<p>Error loading questions.</p>';
    }
  }

  // SHOW ANSWERS
  function showAnswers(event) {

    event.preventDefault();

    const allAnswers =
      document.getElementById(
        'allAnswersOutput'
      );

    const resultsSection =
      document.getElementById(
        'resultsSectionPanel'
      );

    const userAnswers =
      document.querySelectorAll('.user-answer');

    const sentences =
      window.allQuestions || [];

    allAnswers.innerHTML = '';

    userAnswers.forEach((answer, index) => {

      const correctData = sentences[index];

      allAnswers.innerHTML += `
        <div class="result-card">

          <p>
            <strong>Question ${index + 1}:</strong>
            ${correctData.question}
          </p>

          <p>
            <strong>Your Answer:</strong>
            ${answer.value || 'Left Blank'}
          </p>

          <p style="color:green;">
            <strong>Correct Answer:</strong>
            ${correctData.answer}
          </p>

        </div>
      `;
    });

    resultsSection.classList.remove('hidden');

    resultsSection.scrollIntoView({
      behavior: 'smooth'
    });
  }

</script>

</body>
</html>
